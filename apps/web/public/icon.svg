<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="64" fill="#09090b"/>
  <g transform="translate(256,256)" fill="none" stroke="#fafafa" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <!-- Book spine -->
    <path d="M-40,-120 L-40,120"/>
    <!-- Left page -->
    <path d="M-40,-120 Q-120,-130 -160,-100 L-160,100 Q-120,80 -40,120"/>
    <!-- Right page -->
    <path d="M-40,-120 Q40,-130 160,-100 L160,100 Q40,80 -40,120"/>
    <!-- Page lines left -->
    <line x1="-130" y1="-60" x2="-70" y2="-65" stroke-width="12"/>
    <line x1="-135" y1="-20" x2="-65" y2="-25" stroke-width="12"/>
    <line x1="-135" y1="20" x2="-65" y2="15" stroke-width="12"/>
    <line x1="-130" y1="60" x2="-65" y2="55" stroke-width="12"/>
    <!-- Page lines right -->
    <line x1="70" y1="-65" x2="130" y2="-60" stroke-width="12"/>
    <line x1="65" y1="-25" x2="135" y2="-20" stroke-width="12"/>
    <line x1="65" y1="15" x2="135" y2="20" stroke-width="12"/>
    <line x1="65" y1="55" x2="130" y2="60" stroke-width="12"/>
  </g>
</svg>
