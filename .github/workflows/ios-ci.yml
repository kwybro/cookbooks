name: iOS CI

on:
  pull_request:
    paths:
      - 'apps/ios/**'
      - '.github/workflows/ios-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/ios/**'

jobs:
  build:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Build (no signing)
        run: |
          xcodebuild build \
            -project apps/ios/Slowcook.xcodeproj \
            -scheme Slowcook \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color && exit ${PIPESTATUS[0]}

      - name: Test
        run: |
          xcodebuild test \
            -project apps/ios/Slowcook.xcodeproj \
            -scheme Slowcook \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color && exit ${PIPESTATUS[0]}
        continue-on-error: true  # remove once tests are added
