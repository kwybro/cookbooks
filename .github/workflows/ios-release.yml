name: iOS Release

# Trigger manually from GitHub UI or automatically on version tags (e.g. ios/v1.2.3)
on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (leave blank to auto-increment)'
        required: false
      release_notes:
        description: 'TestFlight release notes'
        required: false
        default: 'Internal build'
  push:
    tags:
      - 'ios/v*'

jobs:
  release:
    name: Archive & Upload to TestFlight
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      # ── Code signing ─────────────────────────────────────────────────────────
      # We use App Store Connect API key so Xcode can handle signing automatically.
      # Store these three values as GitHub repository secrets:
      #   APP_STORE_CONNECT_API_KEY_ID          e.g. ABC123DEF4
      #   APP_STORE_CONNECT_API_KEY_ISSUER_ID   e.g. 12345678-1234-...
      #   APP_STORE_CONNECT_API_KEY_P8           the full .p8 file contents
      - name: Write App Store Connect API key
        env:
          API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_P8" > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

      # ── Bump build number ─────────────────────────────────────────────────────
      - name: Set build number
        run: |
          BUILD="${{ github.event.inputs.build_number }}"
          if [ -z "$BUILD" ]; then
            BUILD="${{ github.run_number }}"
          fi
          xcrun agvtool new-version -all "$BUILD"
        working-directory: apps/ios

      # ── Archive ───────────────────────────────────────────────────────────────
      - name: Archive
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -project apps/ios/Slowcook.xcodeproj \
            -scheme Slowcook \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath /tmp/Slowcook.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8 \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_KEY_ISSUER_ID" \
            | xcpretty --color && exit ${PIPESTATUS[0]}

      # ── Export IPA ────────────────────────────────────────────────────────────
      - name: Export IPA
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
        run: |
          cat > /tmp/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath /tmp/Slowcook.xcarchive \
            -exportPath /tmp/Slowcook-export \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8 \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_KEY_ISSUER_ID"

      # ── Upload to TestFlight ──────────────────────────────────────────────────
      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file /tmp/Slowcook-export/Slowcook.ipa \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_KEY_ISSUER_ID"

      - name: Upload archive as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Slowcook-archive
          path: /tmp/Slowcook.xcarchive
          retention-days: 14
