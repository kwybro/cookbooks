name: iOS Release → TestFlight

# Runs automatically on every merge to main that touches the iOS app.
# Also triggerable manually from GitHub mobile (Actions tab → Run workflow).
on:
  push:
    branches:
      - main
    paths:
      - 'apps/ios/**'
      - '.github/workflows/ios-release.yml'
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build number (leave blank to use run number)'
        required: false
      what_to_test:
        description: 'TestFlight "What to Test" notes'
        required: false
        default: ''

jobs:
  testflight:
    name: Archive & Upload to TestFlight
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      # ── Code signing ──────────────────────────────────────────────────────────
      # Required secrets (set in repo Settings → Secrets and variables → Actions):
      #   APP_STORE_CONNECT_API_KEY_ID        e.g. ABC123DEF4
      #   APP_STORE_CONNECT_API_KEY_ISSUER_ID e.g. 12345678-1234-...
      #   APP_STORE_CONNECT_API_KEY_P8        full contents of the .p8 file
      #
      # Generate the key at: App Store Connect → Users & Access → Integrations → Keys
      # Role needed: App Manager (or Developer + access to this app)
      - name: Write App Store Connect API key
        env:
          API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_P8" > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

      # ── Build number ──────────────────────────────────────────────────────────
      # github.run_number auto-increments with every workflow run — good enough
      # for TestFlight. App Store Connect requires each build to have a unique,
      # increasing CFBundleVersion.
      - name: Set build number
        run: |
          BUILD="${{ github.event.inputs.build_number }}"
          if [ -z "$BUILD" ]; then
            BUILD="${{ github.run_number }}"
          fi
          xcrun agvtool new-version -all "$BUILD"
          echo "BUILD_NUMBER=$BUILD" >> "$GITHUB_ENV"
        working-directory: apps/ios

      # ── Archive ───────────────────────────────────────────────────────────────
      - name: Archive
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -project apps/ios/Slowcook.xcodeproj \
            -scheme Slowcook \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath /tmp/Slowcook.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8 \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_KEY_ISSUER_ID" \
            | xcpretty --color && exit ${PIPESTATUS[0]}

      # ── Export & Upload ───────────────────────────────────────────────────────
      # destination=upload means xcodebuild pushes the IPA directly to
      # App Store Connect during the export step — no separate altool call needed.
      - name: Export & upload to App Store Connect
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
        run: |
          cat > /tmp/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath /tmp/Slowcook.xcarchive \
            -exportPath /tmp/Slowcook-export \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8 \
            -authenticationKeyID "$API_KEY_ID" \
            -authenticationKeyIssuerID "$API_KEY_ISSUER_ID"

      # ── Summary ───────────────────────────────────────────────────────────────
      - name: Job summary
        run: |
          echo "## ✅ Build $BUILD_NUMBER uploaded to TestFlight" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "After testing on your device, submit for App Store review by running the" >> "$GITHUB_STEP_SUMMARY"
          echo "[**iOS Submit to App Store**](../../actions/workflows/ios-submit.yml) workflow." >> "$GITHUB_STEP_SUMMARY"

      - name: Save xcarchive
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Slowcook-build-${{ env.BUILD_NUMBER }}
          path: /tmp/Slowcook.xcarchive
          retention-days: 30
